<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Explore the world with WorldAtlas. Search, filter and discover facts about every country — population, capital, region, languages and more."
    />
    <meta
      name="keywords"
      content="world atlas, countries, geography, population, capital cities"
    />

    <!-- Open Graph (Social sharing) -->
    <meta property="og:title" content="WorldAtlas | Explore Every Country" />
    <meta
      property="og:description"
      content="Discover the history, culture, and beauty of every nation."
    />
    <meta property="og:image" content="/images/world.webp" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WorldAtlas" />
    <meta
      name="twitter:description"
      content="Explore every country in the world."
    />

    <title>World Atlas | Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <link
      rel="preload"
      as="image"
      href="/images/world.webp"
      type="image/webp"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
